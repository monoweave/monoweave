name: Release

on:
  workflow_dispatch:

env:
  CI: 1
  ARTIFACT_DIR: ./artifacts

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  pre-release-check:
    name: Publish Monoweave (Precheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-env
      - name: Build
        run: yarn build
      - name: Tests
        run: yarn test:ci

  release:
    name: Publish Monoweave
    runs-on: ubuntu-latest
    needs: [pre-release-check]
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_GITHUB_PAT }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-env
      - name: Build
        run: yarn build
      - name: Publish via Monoweave (Pre-release)
        if: github.ref != 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn run-local \
            --preset monoweave/preset-recommended \
            --log-level 0 \
            --prerelease \
            --package-group-manifest-field group
      - name: Publish via Monoweave
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn run-local \
            --preset monoweave/preset-recommended \
            --log-level 0 \
            --auto-commit-message "chore: release monoweave [skip ci]" \
            --plugins "@monoweave/plugin-github" \
            --package-group-manifest-field group
      - name: Upload Artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: build-artifacts
          path: ${{ env.ARTIFACT_DIR }}
